# ─────────────────────────────────────────────────────────────
#  Render Blueprint — portfolio-backend (NestJS + Prisma + Neon)
#
#  Deploys as an always-on Node web service (free plan):
#  - the @nestjs/schedule Gmail-sync cron runs normally
#  - 10 MB image uploads work (no serverless body limit)
#  - free plan sleeps after ~15 min idle (first request wakes it)
#
#  Migrations run on every boot via `prisma migrate deploy`
#  (idempotent — applies only pending migrations, never seeds).
#  All secrets are set in the Render dashboard (sync: false),
#  never in this file.
# ─────────────────────────────────────────────────────────────
services:
  - type: web
    name: portfolio-backend
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /api/health
    autoDeployTrigger: commit # deploy on every push to the connected branch (main)
    envVars:
      - key: NODE_ENV
        value: production
      # ── Database (Neon) — use the DIRECT (non-pooled) connection string:
      #    a single Render instance holds few connections, and Prisma
      #    migrations require a direct connection anyway.
      - key: DATABASE_URL
        sync: false
      # ── Auth
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      # ── CORS — the deployed frontend origin(s), comma-separated
      #    e.g. https://your-site.vercel.app,https://yourdomain.com
      - key: CORS_ORIGINS
        sync: false
      # ── Public site + admin URLs (used in emails)
      - key: SITE_URL
        sync: false
      - key: ADMIN_MESSAGES_URL
        sync: false
      # ── Cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UPLOAD_FOLDER
        value: portfolio
      # ── Gmail contact/email service (Google OAuth)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GMAIL_USER
        sync: false
      # Optional: override the Gmail polling schedule (cron expression)
      # - key: GMAIL_SYNC_CRON
      #   value: "*/2 * * * *"
